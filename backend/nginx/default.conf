# Tek HTTP girişi (80): API + MinIO (S3) vekili — mobil operatörler genelde 80/443 dışı çıkışı keser.
# MinIO doğrudan 9000 yerine /minio/ altında; MINIO_PUBLIC_URL=http(s)://<host>/minio

upstream api_upstream {
    server api:8080;
}

upstream minio_upstream {
    server minio:9000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    # Görseller / S3 API — dışarıdan http://<host>/minio/<bucket>/<object>
    location /minio/ {
        proxy_pass http://minio_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location / {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
